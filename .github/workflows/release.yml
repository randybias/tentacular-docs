name: Tag release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.5.1)'
        required: true

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create and push tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}
